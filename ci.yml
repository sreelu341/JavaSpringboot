name: Deploy Log Processing UI

on:
  push:
    branches:
      - dev

env:
  DOCKER_IMAGE: log-processing-ui
  DOCKER_TAG: latest
  CONTAINER_NAME: log-processing-ui
  HOST_PORT: 3000
  CONTAINER_PORT: 80

jobs:
  deploy:
    runs-on: self-hosted  # Assumes EC2 runner is registered with GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          repository: sreelu341/JavaSpringboot
          ref: dev

      - name: Build Docker image
        working-directory: FRONTEND
        run: |
          docker build -t $DOCKER_IMAGE:$DOCKER_TAG .

      - name: Deploy to EC2
        run: |
          echo "Stopping old container if running..."
          docker rm -f $CONTAINER_NAME || true

          echo "Starting new container..."
          docker run -d -p $HOST_PORT:$CONTAINER_PORT --name $CONTAINER_NAME $DOCKER_IMAGE:$DOCKER_TAG

      - name: Notify success
        if: success()
        run: echo "✅ Deployment successful! UI is live at http://<EC2-Public-IP>:$HOST_PORT"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check GitHub Actions logs."